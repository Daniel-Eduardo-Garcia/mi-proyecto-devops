name: Auto Commit

on:
  push:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Crear cambio de prueba
        run: |
          echo "Última ejecución: $(date)" >> auto-commit-test.txt

      - name: Git Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: auto commit desde GitHub Actions"